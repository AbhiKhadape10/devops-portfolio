apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-app
  namespace: demo
  annotations:
    # IRSA — IAM Roles for Service Accounts (EKS).
    # Pod gets scoped AWS credentials via OIDC, no IAM keys in env vars.
    eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/demo-app-s3-access
